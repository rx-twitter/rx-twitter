name: push-image
on:
  push:
    branches:
      - main
  release:
    types: [published]

env:
  DOCKER_BASE_NAME: ghcr.io/${{ github.repository }}

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 #v7.0.0
        with:
          fetch-depth: 1

      - name: Lint Bot Dockerfile
        uses: hadolint/hadolint-action@0931ae097296863e5f188b8c6a0c5f9b95f79793 #v3.3.0
        with:
          dockerfile: Dockerfile

  push-image:
    runs-on: ubuntu-latest
    needs: hadolint
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 #v7.0.0

      - name: Set Env
        run: |
          if [ "${{ github.event_name }}" = 'release' ]; then
              export TAG_NAME="${{ github.event.release.tag_name }}"
          else
              export TAG_NAME="latest"
          fi
          echo "PKG_TAG"=${DOCKER_BASE_NAME}:${TAG_NAME} >> ${GITHUB_ENV}

      - name: Build Bot Image
        run: |
          docker build --no-cache . -t "${PKG_TAG}"

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Bot Image
        run: |
          docker push "${PKG_TAG}"
