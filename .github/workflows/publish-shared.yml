name: Publish @rx-twitter/shared

on:
  push:
    branches:
      - main
    paths:
      - "packages/shared/**"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 #v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          registry-url: "https://npm.pkg.github.com"
          scope: "@rx-twitter"

      - name: Install dependencies
        run: npm ci --workspace=@rx-twitter/shared

      - name: Build
        run: npm run build --workspace=@rx-twitter/shared

      - name: Publish to GitHub Packages
        run: npm publish --workspace=@rx-twitter/shared
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
