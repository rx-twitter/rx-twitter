name: release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # - name: checkout repo
      #   uses: actions/checkout@v5

      - name: Create release PR
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 #v4.4.1
        with:
          release-type: node
          token: ${{ secrets.GITHUB_TOKEN }}
