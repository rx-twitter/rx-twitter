name: CI

on:
  pull_request:
    branches: ["main", "develop"]

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d #v6
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Cache node_modules
        uses: actions/cache/save@5b7a9f8ae54e16fe74b141e0cd16a8aa366217c4 #v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: deps-${{ hashFiles('package-lock.json') }}

  test:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d #v6
        with:
          node-version: 24.x
          cache: "npm"

      - name: Restore node_modules
        id: restore
        uses: actions/cache/restore@5b7a9f8ae54e16fe74b141e0cd16a8aa366217c4 #v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: deps-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (fallback)
        if: steps.restore.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline && npm run build:shared

      - name: Run oxlint
        run: npx oxlint src/

      - name: Run oxfmt (format check)
        run: npx oxfmt --check src/

      - name: Run all tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f #v7.0.0
        with:
          files: ./coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d #v6
        with:
          node-version: 24.x
          cache: "npm"

      - name: Restore node_modules
        id: restore
        uses: actions/cache/restore@5b7a9f8ae54e16fe74b141e0cd16a8aa366217c4 #v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/shared/dist
          key: deps-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies (fallback)
        if: steps.restore.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline && npm run build:shared

      - name: Build TypeScript
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "Build successful"
